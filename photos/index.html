  <!-- Mobile Nav Toggle Script -->
  <script>
    const navToggle = document.querySelector('.nav-toggle');
    const mainNav = document.querySelector('#main-nav');

    navToggle.addEventListener('click', () => {
      const isOpen = mainNav.classList.toggle('active');
      navToggle.classList.toggle('active');
      navToggle.setAttribute('aria-expanded', isOpen);
    });

    mainNav.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        mainNav.classList.remove('active');
        navToggle.classList.remove('active');
        navToggle.setAttribute('aria-expanded', 'false');
      });
    });
  </script>

  <!-- Lightbox Script -->
  <script>
    const items = Array.from(document.querySelectorAll('.photo-item'));
    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lightbox-img');
    const lbCaption = document.getElementById('lightbox-caption');
    const lbClose = document.getElementById('lightbox-close');
    const lbPrev = document.getElementById('lightbox-prev');
    const lbNext = document.getElementById('lightbox-next');
    let current = 0;

    function openLightbox(index) {
      current = index;
      const item = items[current];
      const img = item.querySelector('img');
      const caption = item.querySelector('figcaption').textContent.trim();
      // Use full-res from couple_pictures/ (not web/) for lightbox
      lbImg.src = img.src.replace('/couple_pictures/web/', '/couple_pictures/');
      lbImg.alt = img.alt;
      lbCaption.textContent = caption;
      lbCaption.style.display = caption ? 'block' : 'none';
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
      lbImg.focus();
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
      document.body.style.overflow = '';
    }

    function showPrev() {
      openLightbox((current - 1 + items.length) % items.length);
    }

    function showNext() {
      openLightbox((current + 1) % items.length);
    }

    items.forEach((item, i) => {
      item.addEventListener('click', () => openLightbox(i));
    });

    lbClose.addEventListener('click', closeLightbox);
    lbPrev.addEventListener('click', showPrev);
    lbNext.addEventListener('click', showNext);

    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') showPrev();
      if (e.key === 'ArrowRight') showNext();
    });
  </script>
